<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Extractor Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Lead Extractor Pro</h1>
            <span class="email-count" id="emailCount">0 emails</span>
        </header>

        <nav class="tabs">
            <button class="tab active" data-tab="single">Single Scan</button>
            <button class="tab" data-tab="sheets">Google Sheets</button>
            <button class="tab" data-tab="bulk">Bulk Scan</button>
        </nav>

        <div class="tab-content active" id="tab-single">
            <div class="field">
                <label for="singleUrl">Website URL</label>
                <div class="input-row">
                    <input type="text" id="singleUrl" placeholder="https://example.com" />
                    <button id="scanBtn" class="btn primary">Scan</button>
                </div>
            </div>
        </div>

        <div class="tab-content" id="tab-sheets">
            <div class="field">
                <label for="spreadsheetId">Spreadsheet ID</label>
                <input type="text" id="spreadsheetId" placeholder="Enter Spreadsheet ID" />
                <p class="help-text">Found in your Google Sheet URL: /d/<b>ID</b>/edit</p>
            </div>
            <div class="field">
                <label for="sheetName">Sheet Name</label>
                <input type="text" id="sheetName" placeholder="Sheet1" value="Sheet1" />
            </div>
            <p class="help-text">Reads URLs from Col C | Writes: Name→H, Email→I, Contact→J</p>
            <div class="controls">
                <button id="authBtn" class="btn secondary">Authorize</button>
                <button id="startBtn" class="btn primary" disabled>Start</button>
                <button id="stopBtn" class="btn danger" disabled>Stop</button>
            </div>
        </div>

        <div class="tab-content" id="tab-bulk">
            <div class="field">
                <label for="bulkDomains">Domains (one per line)</label>
                <textarea id="bulkDomains" rows="5" placeholder="example.com&#10;another.com&#10;website.org"></textarea>
            </div>
            <button id="bulkStartBtn" class="btn primary btn-full">Start Bulk Scan</button>
            <div class="progress-bar-container" id="bulkProgressContainer" style="display:none;">
                <div class="progress-bar" id="bulkProgress"></div>
            </div>
            <span class="progress-text" id="bulkProgressText"></span>
        </div>

        <div class="status-panel">
            <div class="status-header">
                <h3>Status</h3>
                <div id="spinner" class="spinner hidden"></div>
            </div>
            <div id="statusText">Ready</div>
            <div class="stats">
                <span>Processed: <b id="processedCount">0</b></span>
                <span>Found: <b id="foundCount">0</b></span>
            </div>
        </div>

        <div class="results-section" id="resultsSection" style="display:none;">
            <div class="results-header">
                <h3>Results</h3>
                <div class="results-actions">
                    <button id="copyBtn" class="btn-icon" title="Copy to clipboard">📋</button>
                    <button id="exportCsvBtn" class="btn-icon" title="Export CSV">💾</button>
                </div>
            </div>
            <div class="results-table-wrap">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Domain</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Contact</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>
        </div>

        <div class="logs-section">
            <h3>Logs</h3>
            <div class="logs" id="logs"></div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
